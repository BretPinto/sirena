<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sirena Vecinal</title>
  <style>
    :root {
      --rojo: #d32f2f;
      --rojo-osc: #9a0007;
      --gris: #455a64;
      --gris-osc: #1c313a;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1720; color: #fff;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px; gap: 16px;
    }
    h1 { font-size: 22px; margin: 8px 0 0; text-align: center; letter-spacing: .5px; }
    .sub { color: #90a4ae; font-size: 14px; margin: 0 0 8px; text-align: center; }
    .btn {
      width: 100%; max-width: 420px; border: none; border-radius: 20px;
      padding: 42px 20px; font-size: 30px; font-weight: 800; color: #fff;
      cursor: pointer; letter-spacing: 1px; transition: transform .08s, filter .15s;
      box-shadow: 0 8px 24px rgba(0,0,0,.4); touch-action: manipulation;
    }
    .btn:active { transform: scale(.97); }
    .btn-on  { background: linear-gradient(160deg, var(--rojo), var(--rojo-osc)); }
    .btn-off { background: linear-gradient(160deg, var(--gris), var(--gris-osc)); }
    .btn:disabled { filter: grayscale(.6) opacity(.6); cursor: default; }
    .icono { display: block; font-size: 40px; margin-bottom: 6px; }
    #estado {
      min-height: 24px; font-size: 15px; text-align: center;
      color: #b0bec5; max-width: 420px; transition: color .2s;
    }
    #estado.ok { color: #69f0ae; }
    #estado.err { color: #ff8a80; }
    .pie { font-size: 12px; color: #546e7a; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🚨 SIRENA ASOSIACIÓN BONANZA</h1>
  <p class="sub">Uso para emergencias. Sal de casa al escuchar la sirena.</p>
  <button class="btn btn-on" id="btnOn" onclick="activar('on')">
    <span class="icono">🔔</span> ACTIVAR
  </button>
  <button class="btn btn-off" id="btnOff" onclick="activar('off')">
    <span class="icono">🔕</span> APAGAR
  </button>
  <div id="estado">Listo.</div>
  <div class="pie">2026 @ Creado por Antonhy Pinto</div>
  <script>
    const WEBHOOKS = {
      on:  "https://us-apia.coolkit.cc/v2/smartscene2/webhooks/execute?id=638a51f14dd74cc485d6125fd08e9556",
      off: "https://us-apia.coolkit.cc/v2/smartscene2/webhooks/execute?id=9df5289c0995401193ebec4dbfa13a79"
    };
    const estado = document.getElementById("estado");
    const btnOn  = document.getElementById("btnOn");
    const btnOff = document.getElementById("btnOff");
    function setEstado(txt, tipo) {
      estado.textContent = txt;
      estado.className = tipo || "";
    }
    async function activar(accion) {
      btnOn.disabled = true; btnOff.disabled = true;
      setEstado(accion === "on" ? "Activando sirena..." : "Apagando sirena...", "");
      try {
        await fetch(WEBHOOKS[accion], { method: "GET", mode: "no-cors", cache: "no-store" });
        setEstado(
          accion === "on" ? "\u2705 Se\u00f1al enviada. La sirena debe sonar." : "\u2705 Se\u00f1al enviada. La sirena se apaga.",
          "ok"
        );
      } catch (e) {
        setEstado("\u26a0\ufe0f Error de red. Revisa tu conexi\u00f3n e intenta de nuevo.", "err");
      } finally {
        setTimeout(() => { btnOn.disabled = false; btnOff.disabled = false; }, 3000);
      }
    }
  </script>
</body>
</html>
